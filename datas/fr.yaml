experiences:
  - name: XXII
    position: Senior DevOps developer
    dates: 02 Mai, 2023 - ...
    description: |
      Gestion et maintenabilité du déploiement de XXII :
      - Mise en place de CI/CD (Gitlab-CI, ArgoCD, Bash)
      - Mise en place de bonnes pratiques de code
      - Mise en place et maintenance d\'outils de monitoring (Grafana, Loki, Pyroscope, eBPF)
      - Développer et maintenir la stack Kubernetes (k0s, helm, tanka, golang)
      - Développer et maintenir des services Python (FastAPI, SQLAlchemy), les tests unitaires (pytest, unittest) et les tests end-to-end (Playwright)
      - Développer et maintenir les migrations de bases de données SQL
      - Développer et maintenir des images Docker (build multi-arch sur plusieurs serveurs en CI, versioning)
      - Développer et maintenir une distribution Linux pour le déploiement automatique
      - Permettre le déploiement sur site dans des environnements déconnectés d\'Internet
      - Migrer les manifests de déploiement de Helm vers Tanka (Jsonnet) service par service
      - Construire et maintenir la stack d\'observabilité (Prometheus Agent, remote write, Alertmanager, Loki, tableaux de bord Grafana)
      - Automatiser le provisionnement et la configuration des serveurs avec Ansible (UFW, Docker, VPN, monitoring)
      - Gérer l\'infrastructure cloud avec OpenTofu (AWS EC2, S3, Google Compute Engine, GKE, VPC, GCS, etc.)
      - Gérer des bases de données PostgreSQL sur serveurs bare-metal
    link: https://www.xxii.fr/
  - name: Spacefill
    position: Senior fullstack developer
    dates: 30 Septembre, 2019 - 31 Mars, 2023
    description: |
      Conception, gestion et maintenabilité de Spacefill :
      - Créer et maintenir le processus d\'onboarding pour permettre aux développeurs d\'être prêts en un ou deux jours
      - Créer des issues avec des spécifications détaillées qui peuvent être exécutées par n\'importe qui
      - Développement de fonctionnalités (Javascript, HTML, CSS, Python, Bash, React, PL/pgSQL, Docker, Ansible, Terraform, Gitlab-CI)
      - Développer et maintenir l\'environnement du développeur (monorepo, versioning des dépendances avec asdf et Direnv, mise en place de VM locales)
      - Développer et maintenir la CI (build et déploiement de service, versioning de services, déploiement automatique, CI/CD) avec Gitlab-CI et serveurs bare-metal
      - Développer et maintenir des images Docker (construction multi-arch sur plusieurs serveurs en CI, versioning)
      - Développer et maintenir des services (bases de données, migrations, web monorepo en JS avec esbuild), des tests unitaires (pgTAP), des tests end-to-end (Jest, puppeteer)
      - Développer et maintenir l\'infrastructure (AWS, Online/Scaleway, S3, bare-metal, VMs, Ansible, Terraform)
      - Développer des déploiements Kubernetes
    link: https://spacefill.eu/
  - name: Ecotiz / Joinly
    position: Lead backend developer
    dates: 01 Janvier, 2019 - 27 Septembre, 2019
    description: |
      Conception et gestion du backend et de l\'infra chez Ecotiz
      - Migration des anciens services (depuis PHP 5, NodeJS 8 et AngularJS) vers un environnement docker
      - Refactoriser les anciennes API de NodeJS (avec callback) et PHP vers une API entièrement async/await
      - Développement de tests unitaires/intégration/end2end (Jest, puppeteer, Sinon.JS)
      - Mise en place de CI entières pour lint/test/build/deploy services avec Gitlab-CI
      - Migration d\'une ancienne infrastructure avec déploiement manuel vers un déploiement entièrement automatisé (avec Gitlab-CI/Ansible/Terraform/AWS/S3)
    link: https://www.assoconnect.com/
  - name: Scaleway
    position: Fullstack DevOps developer
    dates: 01 Janvier, 2018 - 31 Décembre, 2018
    description: |
      Conception d\'un service from scratch (CLI/Frontend/Backend/Déploiement) permettant de déployer un serveur bare-metal à la demande.
      - Création et gestion de l\'environnement bare-metal (serveurs) chez Scaleway/Online.
      - API Golang (JSON/gRPC) Script Python/Bash
      - Compétences en réseautage, y compris la compréhension des protocoles réseau, la configuration de l\'interface réseau, la configuration du pare-feu et la configuration de la sécurité (DHCP, NAT...)
      - Connaissance de l\'architecture matérielle des serveurs, y compris la compréhension des différents types de processeurs, de mémoire, de disques durs et de cartes réseau.
      - Maîtrise des systèmes d\'exploitation tels que Linux et Windows, et capacité à installer, configurer et gérer automatiquement ces systèmes sur des serveurs bare-metal.
      - Compétences en automatisation, y compris la capacité d\'écrire des scripts et d\'utiliser des outils d\'automatisation pour automatiser les tâches de provisionnement.
      - Maintenir les services hérités en PHP.
    link: https://www.scaleway.com
