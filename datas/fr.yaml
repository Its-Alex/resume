description: |
  Je suis Alexandre Marre passionné d\'informatique depuis l\'enfance. J\'ai commencé à apprendre à la maison quand j\'avais seize ans. Rapidement, j\'ai développé un véritable amour pour ce domaine et j\'ai choisi d\'approfondir mes connaissances à l\'école. Cela m\'a conduit à une classe préparatoire et à l\'école 42. \
  Je suis un fervent partisan de l\'open source et je m\'efforce de contribuer et d\'aider les projets sur Github ou d\'autres plateformes chaque fois que possible. Je suis curieux et j\'aime apprendre et découvrir de nouvelles choses, ce qui fait de moi un touche-à-tout. J\'ai l\'habitude de travailler avec des méthodes agiles et de respecter les principes KISS et YAGNI.
